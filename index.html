<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#534AB7" />
  <meta name="description" content="Aprende las tablas de multiplicar de forma divertida" />
  <link rel="manifest" href="manifest.json" />
  <title>¡Aprende las Tablas!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #534AB7; --purple-light: #EEEDFE; --purple-dark: #3C3489;
      --green: #3B6D11; --green-light: #EAF3DE;
      --red: #A32D2D; --red-light: #FCEBEB;
      --amber: #854F0B; --amber-light: #FAEEDA;
      --text: #1a1a2e; --text-muted: #6b6b8a;
      --bg: #f4f3ff; --card: #ffffff;
      --border: rgba(83,74,183,0.15);
      --radius: 14px; --radius-sm: 9px;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem;
    }
    .app { width: 100%; max-width: 480px; padding-bottom: 2rem; }

    /* Header */
    .app-header { text-align: center; padding: 1.5rem 0 1rem; }
    .app-logo { font-size: 48px; margin-bottom: 4px; }
    .app-title { font-size: 26px; font-weight: 800; color: var(--purple); }
    .app-sub { font-size: 14px; color: var(--text-muted); margin-top: 2px; }

    /* Card */
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 2px 16px rgba(83,74,183,0.07); }

    /* Table buttons */
    .section-label { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .table-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .table-btn {
      aspect-ratio: 1; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    }
    .table-btn:hover { border-color: var(--purple); background: var(--purple-light); color: var(--purple); }
    .table-btn.active { background: var(--purple); color: white; border-color: var(--purple); transform: scale(1.05); }

    /* Level buttons */
    .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .level-btn {
      padding: 12px 8px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      background: var(--bg); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; text-align: center; transition: all 0.15s; color: var(--text);
    }
    .level-btn .level-icon { font-size: 22px; display: block; margin-bottom: 2px; }
    .level-btn .level-tag { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .level-btn:hover { border-color: var(--purple); background: var(--purple-light); }
    .level-btn.active { border-color: var(--purple); background: var(--purple-light); color: var(--purple); }

    /* Start button */
    .start-btn {
      width: 100%; padding: 16px; border-radius: var(--radius); border: none;
      background: var(--purple); color: white; font-family: 'Nunito', sans-serif;
      font-size: 18px; font-weight: 800; cursor: pointer; transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .start-btn:hover:not(:disabled) { background: var(--purple-dark); transform: translateY(-1px); }
    .start-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    /* Game screen */
    .score-row { display: flex; justify-content: space-around; margin-bottom: 1rem; }
    .score-box { text-align: center; }
    .score-val { font-size: 22px; font-weight: 800; color: var(--purple); }
    .score-lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .stars-row { text-align: center; font-size: 26px; letter-spacing: 4px; margin-bottom: 0.75rem; }

    .progress-wrap { background: var(--purple-light); border-radius: 99px; height: 8px; margin-bottom: 1.25rem; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: var(--purple); transition: width 0.4s ease; }

    .question-card { background: var(--purple); border-radius: var(--radius); padding: 2rem 1rem; text-align: center; margin-bottom: 1rem; }
    .question-num { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .question-text { font-size: 42px; font-weight: 800; color: white; letter-spacing: 2px; }

    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .opt-btn {
      padding: 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      background: var(--card); font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800;
      cursor: pointer; transition: all 0.15s; color: var(--text);
    }
    .opt-btn:hover:not(:disabled) { border-color: var(--purple); background: var(--purple-light); color: var(--purple); }
    .opt-btn.correct { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .opt-btn.wrong   { background: var(--red-light); border-color: var(--red); color: var(--red); }
    .opt-btn:disabled { cursor: default; }

    .type-row { display: flex; gap: 8px; margin-top: 4px; }
    .type-input {
      flex: 1; padding: 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 700; text-align: center;
      background: var(--card); color: var(--text); outline: none;
    }
    .type-input:focus { border-color: var(--purple); }
    .type-input.correct { border-color: var(--green); background: var(--green-light); color: var(--green); }
    .type-input.wrong   { border-color: var(--red); background: var(--red-light); color: var(--red); }
    .confirm-btn {
      padding: 14px 20px; border-radius: var(--radius-sm); border: none;
      background: var(--purple); color: white; font-family: 'Nunito', sans-serif;
      font-size: 20px; font-weight: 800; cursor: pointer; transition: background 0.15s;
    }
    .confirm-btn:hover { background: var(--purple-dark); }

    .feedback-box { min-height: 36px; text-align: center; margin-bottom: 0.25rem; }
    .feedback-txt { font-size: 17px; font-weight: 700; }
    .feedback-txt.good { color: var(--green); }
    .feedback-txt.bad  { color: var(--red); }
    .streak-badge { display: inline-block; background: var(--amber-light); color: var(--amber); font-size: 13px; font-weight: 700; padding: 4px 14px; border-radius: 99px; margin-top: 4px; }

    /* End screen */
    .end-wrap { text-align: center; padding: 1rem 0; }
    .end-stars { font-size: 40px; letter-spacing: 6px; margin-bottom: 1rem; }
    .end-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .end-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
    .stats-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 20px; text-align: center; min-width: 80px; }
    .stat-val { font-size: 24px; font-weight: 800; color: var(--purple); }
    .stat-lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    .end-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-primary { padding: 13px 28px; border-radius: var(--radius-sm); border: none; background: var(--purple); color: white; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: var(--purple-dark); }
    .btn-secondary { padding: 13px 28px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--card); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .btn-secondary:hover { border-color: var(--purple); color: var(--purple); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">

  <!-- Setup screen -->
  <div id="setup-screen">
    <div class="app-header">
      <div class="app-logo">🧮</div>
      <div class="app-title">¡Aprende las Tablas!</div>
      <div class="app-sub">Practica y conviértete en campeón</div>
    </div>

    <div class="card">
      <div class="section-label">¿Qué tabla quieres practicar?</div>
      <div class="table-grid" id="table-btns"></div>
    </div>

    <div class="card">
      <div class="section-label">Nivel de dificultad</div>
      <div class="level-grid">
        <button class="level-btn active" id="lvl-easy" onclick="setLevel('easy')">
          <span class="level-icon">🟢</span>
          Fácil
          <span class="level-tag">Elige la respuesta</span>
        </button>
        <button class="level-btn" id="lvl-hard" onclick="setLevel('hard')">
          <span class="level-icon">🔴</span>
          Difícil
          <span class="level-tag">Escribe la respuesta</span>
        </button>
      </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startGame()" disabled>Empezar →</button>
  </div>

  <!-- Game screen -->
  <div id="game-screen" class="hidden">
    <div class="app-header" style="padding-top:0.5rem;">
      <div class="stars-row" id="stars-display">☆☆☆☆☆</div>
      <div class="score-row">
        <div class="score-box"><div class="score-val" id="score-num">0</div><div class="score-lbl">puntos</div></div>
        <div class="score-box"><div class="score-val" id="correct-num">0</div><div class="score-lbl">correctas</div></div>
        <div class="score-box"><div class="score-val" id="q-num">1/10</div><div class="score-lbl">pregunta</div></div>
      </div>
      <div id="streak-area"></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="question-card">
      <div class="question-num" id="q-label">Pregunta 1 de 10</div>
      <div class="question-text" id="question-text">? × ? = ?</div>
    </div>
    <div class="card" style="padding:1rem;">
      <div id="options-area"></div>
    </div>
    <div class="feedback-box" id="feedback"></div>
  </div>

  <!-- End screen -->
  <div id="end-screen" class="hidden">
    <div class="app-header">
      <div class="app-logo">🏆</div>
      <div class="app-title">¡Juego terminado!</div>
    </div>
    <div class="card">
      <div class="end-wrap" id="end-content"></div>
    </div>
  </div>

</div>

<script>
const GOOD = ["¡Excelente! 🎉","¡Muy bien! ⭐","¡Correcto! 🙌","¡Eso es! 🔥","¡Genial! 💪","¡Perfecto! ✨","¡Increíble! 🌟"];
const BAD  = ["¡Casi! Sigue intentando 💙","¡No te rindas! 💪","¡La próxima seguro! 🌟","¡Vas muy bien igual! 🙂","¡Tú puedes! 😊"];
let table=null, level='easy', questions=[], cur=0, score=0, correct=0, streak=0, maxStreak=0;
const TOTAL=10;

for(let i=1;i<=10;i++){
  const b=document.createElement('button');
  b.className='table-btn'; b.textContent=i;
  b.onclick=()=>selectTable(i);
  document.getElementById('table-btns').appendChild(b);
}

function selectTable(n){
  table=n;
  document.querySelectorAll('.table-btn').forEach(b=>b.classList.toggle('active',+b.textContent===n));
  updateStart();
}
function setLevel(l){
  level=l;
  document.getElementById('lvl-easy').classList.toggle('active',l==='easy');
  document.getElementById('lvl-hard').classList.toggle('active',l==='hard');
}
function updateStart(){
  const btn=document.getElementById('start-btn');
  btn.disabled=!table;
}
function shuffle(a){return a.sort(()=>Math.random()-0.5);}

function startGame(){
  questions=shuffle([...Array(10)].map((_,i)=>i+1)).map(n=>({a:table,b:n,ans:table*n}));
  cur=0;score=0;correct=0;streak=0;maxStreak=0;
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  showQ();
}

function showQ(){
  if(cur>=TOTAL){endGame();return;}
  const q=questions[cur];
  document.getElementById('question-text').textContent=`${q.a} × ${q.b} = ?`;
  document.getElementById('q-num').textContent=`${cur+1}/${TOTAL}`;
  document.getElementById('q-label').textContent=`Pregunta ${cur+1} de ${TOTAL}`;
  document.getElementById('progress-fill').style.width=`${(cur/TOTAL)*100}%`;
  document.getElementById('feedback').innerHTML='';
  updateStars();

  const area=document.getElementById('options-area');
  if(level==='easy'){
    const w=[];
    while(w.length<3){const v=q.ans+Math.floor(Math.random()*14)-7; if(v!==q.ans&&v>0&&!w.includes(v))w.push(v);}
    const opts=shuffle([q.ans,...w]);
    area.innerHTML=`<div class="options-grid">${opts.map(o=>`<button class="opt-btn" onclick="checkOpt(${o},${q.ans},this)">${o}</button>`).join('')}</div>`;
  } else {
    area.innerHTML=`<div class="type-row">
      <input class="type-input" type="number" id="ans-input" placeholder="?" onkeydown="if(event.key==='Enter')checkTyped(${q.ans})">
      <button class="confirm-btn" onclick="checkTyped(${q.ans})">✓</button>
    </div>`;
    setTimeout(()=>{const el=document.getElementById('ans-input');if(el)el.focus();},60);
  }
}

function checkOpt(val,ans,btn){
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  btn.classList.add(val===ans?'correct':'wrong');
  if(val!==ans) document.querySelectorAll('.opt-btn').forEach(b=>{if(+b.textContent===ans)b.classList.add('correct');});
  handle(val===ans);
}
function checkTyped(ans){
  const el=document.getElementById('ans-input');
  const val=+el.value; const ok=val===ans;
  el.disabled=true; el.classList.add(ok?'correct':'wrong');
  document.querySelector('.confirm-btn').disabled=true;
  handle(ok, ok?null:`La respuesta era ${ans}`);
}

function handle(ok, hint){
  if(ok){
    streak++; correct++;
    const pts=streak>=3?200:100;
    score+=pts; maxStreak=Math.max(maxStreak,streak);
    const msg=GOOD[Math.floor(Math.random()*GOOD.length)];
    const extra=streak>=3?` <span style="color:#854F0B;font-size:13px">+racha ×${streak}!</span>`:'';
    document.getElementById('feedback').innerHTML=`<span class="feedback-txt good">${msg}${extra}</span>`;
    document.getElementById('streak-area').innerHTML=streak>=3?`<span class="streak-badge">🔥 Racha de ${streak}</span>`:'';
  } else {
    streak=0;
    const msg=BAD[Math.floor(Math.random()*BAD.length)];
    const h=hint?`<span style="font-size:13px;color:var(--text-muted);display:block;margin-top:2px">${hint}</span>`:'';
    document.getElementById('feedback').innerHTML=`<span class="feedback-txt bad">${msg}</span>${h}`;
    document.getElementById('streak-area').innerHTML='';
  }
  document.getElementById('score-num').textContent=score;
  document.getElementById('correct-num').textContent=correct;
  updateStars();
  cur++;
  setTimeout(showQ, ok?1100:1600);
}

function updateStars(){
  const pct=cur===0?0:correct/cur;
  const s=Math.round(pct*5);
  document.getElementById('stars-display').textContent='★'.repeat(s)+'☆'.repeat(5-s);
}

function endGame(){
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.remove('hidden');
  const pct=correct/TOTAL;
  const s=Math.round(pct*5);
  const starsStr='★'.repeat(s)+'☆'.repeat(5-s);
  let msg='', color='var(--purple)';
  if(pct===1){msg='¡Perfecto! ¡Eres un genio! 🏆';color='#27500A';}
  else if(pct>=0.8){msg='¡Muy bien! ¡Casi perfecto! 🌟';color='#27500A';}
  else if(pct>=0.6){msg='¡Bien hecho! Sigue practicando 💪';color='#633806';}
  else{msg='¡Cada vez mejor! No te rindas 💙';color='#0C447C';}
  document.getElementById('end-content').innerHTML=`
    <div class="end-stars">${starsStr}</div>
    <div class="end-title" style="color:${color}">${msg}</div>
    <div class="end-sub">Tabla del ${table} · Nivel ${level==='easy'?'fácil':'difícil'}${maxStreak>=3?' · 🔥 racha máx '+maxStreak:''}</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${correct}/${TOTAL}</div><div class="stat-lbl">correctas</div></div>
      <div class="stat-box"><div class="stat-val">${score}</div><div class="stat-lbl">puntos</div></div>
      <div class="stat-box"><div class="stat-val">${maxStreak}</div><div class="stat-lbl">racha máx</div></div>
    </div>
    <div class="end-btns">
      <button class="btn-primary" onclick="replayTable()">Repetir tabla del ${table}</button>
      <button class="btn-secondary" onclick="goSetup()">Otra tabla</button>
    </div>`;
}
function replayTable(){document.getElementById('end-screen').classList.add('hidden');startGame();}
function goSetup(){document.getElementById('end-screen').classList.add('hidden');document.getElementById('setup-screen').classList.remove('hidden');}
</script>
</body>
</html>
